---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Deploy Nginx site config
  template:
    src: mooztau.conf.j2
    dest: /etc/nginx/sites-available/{{ domain }}
    mode: "0644"
  notify: Reload nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/{{ domain }}
    dest: /etc/nginx/sites-enabled/{{ domain }}
    state: link
  notify: Reload nginx

- name: Remove default site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Reload nginx

- name: Test Nginx config
  command: nginx -t
  changed_when: false

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: true
