apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: mooztau
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
        - name: chat
          image: mooztau_chat:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: mooztau-config
            - secretRef:
                name: mooztau-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8006
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24  # up to 120s for slow startup (alembic, seed)
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: chat
  namespace: mooztau
spec:
  selector:
    app: chat
  ports:
    - port: 8006
      targetPort: 8006
  type: ClusterIP
