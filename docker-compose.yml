services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-mooztau_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: ./auth_service
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8004:8004"
    restart: unless-stopped
    command: >
      sh -c "sleep 3 && python seed.py && uvicorn main:app --host 0.0.0.0 --port 8004 --workers 2"

  orders:
    build: ./orders_service
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && python -m scripts.seed && uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_API_URL: "https://api.mooztau.kz"
        VITE_ORDERS_API_URL: "https://api.mooztau.kz"
        VITE_FINANCE_API_URL: "https://api.mooztau.kz"
    ports:
      - "0.0.0.0:3100:80"
    depends_on:
      - auth
      - orders
    restart: unless-stopped

volumes:
  pgdata:
