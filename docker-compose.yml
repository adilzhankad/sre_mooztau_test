services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-mooztau_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build: ./auth_service
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8002"
    restart: unless-stopped
    command: >
      sh -c "sleep 3 && python seed.py && uvicorn main:app --host 0.0.0.0 --port 8002 --workers 2"

  orders:
    build: ./orders_service
    env_file: .env
    environment:
      DB_HOST: db
      FINANCE_SERVICE_URL: http://finance:8003
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    expose:
      - "8001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head && python -m scripts.seed && uvicorn main:app --host 0.0.0.0 --port 8001 --workers 2"

  finance:
    build: ./finance_service
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    expose:
      - "8003"
    restart: unless-stopped
    command: >
      sh -c "python seed.py && uvicorn main:app --host 0.0.0.0 --port 8003 --workers 2"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTH_API_URL: ""
        VITE_ORDERS_API_URL: ""
        VITE_FINANCE_API_URL: ""
    ports:
      - "0.0.0.0:3100:80"
    depends_on:
      - auth
      - orders
      - finance
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.10.0
    platform: linux/amd64
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:9100'
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    ports:
      - "9100:9100"
    depends_on:
      - orders
      - auth
      - finance
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    platform: linux/amd64
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
    ports:
      - "9093:9093"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_HTTP_PORT: "7777"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "7777:7777"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  grafana_data:
