name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from Actions UI

concurrency:
  group: deploy-production
  cancel-in-progress: false  # always finish the running deploy

permissions:
  contents: read

jobs:
  validate:
    name: Re-validate before deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: docker compose config --quiet
      - name: Install kubeconform + validate
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin kubeconform
          kubeconform -strict -summary k8s/

  deploy:
    name: Deploy to server
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          command_timeout: 15m
          script: |
            eval "$(ssh-agent -s)"
            ssh-add ~/.ssh/deploy_key
            cd ~/mooztau
            ./deploy.sh

      - name: Health check after deploy
        id: healthcheck
        run: |
          HOST="${{ secrets.SERVER_HOST }}"
          echo "Waiting 20s for services to settle..."
          sleep 20
          fail=0
          for port in 8001 8002 8003 8004 8005 8006; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "http://${HOST}:${port}/health" || true)
            echo "Port ${port} → ${code}"
            [ "$code" = "200" ] || fail=$((fail+1))
          done
          if [ "$fail" -gt 0 ]; then
            echo "::error::${fail} service(s) failed health check"
            exit 1
          fi

  notify:
    name: Notify Telegram
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: msg
        run: |
          STATUS="${{ needs.deploy.result }}"
          ICON="✅"; [ "$STATUS" != "success" ] && ICON="❌"
          echo "text=${ICON} MoozTau deploy ${STATUS}%0A%0ACommit: ${GITHUB_SHA::8}%0ABranch: ${GITHUB_REF_NAME}%0ABy: ${GITHUB_ACTOR}%0ARun: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        if: env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${{ steps.msg.outputs.text }}" \
            -d "disable_web_page_preview=true" > /dev/null || true
